  doors:
    alum:
      subtitle1: Without glass Aluminium DOORS
      info1: Full aluminum doors are solid and aesthetic structures that consist of a frame and aluminum filling, without glass or glazing. These doors are characterized by solidity and excellent durability. Solid aluminum doors are a popular choice in a variety of building types, including commercial, industrial and residential construction. Their solidity, durability and ability to adapt to various requirements make them a valued solution on the door market.
      subtitle2: GLASSED aluminium DOORS
      info2: Glazed aluminum doors are light, which makes them easy to install and use. At the same time, aluminum profiles are exceptionally durable, which guarantees long-term operation. Aluminum doors are also resistant to corrosion, which makes them suitable for use in various weather conditions, including at the seaside. Glazed panels allow abundant natural light into the rooms, making them more welcoming and cozy.
    pvc:
      subtitle1: Without glass PVC DOORS
      info1: Solid PVC doors are available in various designs, shapes and colors, which allows you to adapt them to the interior design and individual preferences. It is a practical, durable and versatile solution that combines many advantages, such as thermal and sound insulation, ease of cleaning and the availability of various design options. It is an ideal choice for many types of rooms, both at home and in business.
      subtitle2: GLASSED PVC DOORS
      info2: Glazed PVC doors are a stylish and functional solution that combines aesthetics with thermal and sound insulation in rooms. Made of durable plastic, these doors offer an elegant look that suits many types of interiors, both modern and traditional. Glazed panels allow abundant natural light into the rooms, making them more welcoming and cozy.
  blinds:
    title: Blinds
    plastic: PLASTIC
    information: Information
    text1: The OPOTERM system is designed for installation in new buildings and in the reconstruction of existing buildings. The design of the OPOTERM system allows for fully open, partially closed or fully closed installation of the roller shutter. In order to ensure maximum thermal insulation, additional insulation is installed in the OPOTERM system box along the entire length of the box and side covers. One of the options of the options is the use of a mosquito net embedded in the blind box (MOSKITO system). MOSKITO SYSTEM). The integrated system ensures independent operation of the roller shutter and the MOSKITO mosquito net. The components used for the production of Aluprof roller shutters are certified for compliance with the relevant technical tolerances and are available to customers.
    text2: Dimensions of the plastic box
    text3: "height: 170 mm, 210 mm, 240 mm, width: 230 mm, 255 mm 230 mm, 255 mm"
    item1: Partially hidden box
    item2: Сompletely hidden box
    item3: Open box
    item4: Box with built-in moskito system
    aluminium: alluminium
    text4: The system is designed for use in existing buildings. The fabric is rolled up in an aluminum box that is installed on the wall or in a window niche. Aluminum profiles are made of high-quality aluminum sheet coated with PUR-PA lacquer and are highly resistant to abrasion and weather conditions. Filling foam provides the profiles with good thermal and sound insulation parameters. Reliable design and construction of the roller shutters, as well as a good selection of materials, provide effective protection against unwanted guests.
    text5: Dimensions of the plastic box
    text6: "in height and width : 150 mm, 165 mm, 180 mm, 205 mm"
    text7: The roller shutter can be operated manually or electrically with a motor.
