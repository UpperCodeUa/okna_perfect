    about-us:
      title: Perfect wad group
      text1: The first company of the Perfect WAD Group, Perfect WIN, started producing PVC windows 17 years ago.  In 2015, Perfect AL started producing aluminum structures, aluminum and ventilated facades.
      text2: Innovation is part of the company's DNA. In 2013, the company made a breakthrough in the market by launching windows based on a 6-chamber system with an installation depth of 70 mm. In 2015, the company introduced an exclusive and innovative product - blinds integrated into a double-glazed unit (Comfort Life).
      text3: In 2023, the company introduced innovative Hybrid windows to the market that combine the advantages of aluminum and PVC.  The entire product line of the company - aluminum windows and structures, hybrid windows and PVC windows - is available in the markets of Europe, the USA and Canada.
      text4: We have offices in Poland, Romania, and Ukraine. We are open to cooperation and strive to build long-term relationships with our customers, trying to be a reliable partner.
