    about-us:
      title: Perfect WAD Group
      text1: První společnost skupiny Perfect WAD, Perfect WIN, začala vyrábět PVC okna před 17 lety. V roce 2015 začala společnost Perfect AL vyrábět hliníkové konstrukce, hliníkové a větrané fasády.
      text2: Inovace jsou součástí DNA společnosti. V roce 2013 společnost udělala průlom na trhu uvedením oken založených na 6-komorovém systému s instalační hloubkou 70 mm. V roce 2015 společnost představila exkluzivní a inovativní produkt – žaluzie integrované do izolačního skla (Comfort Life).
      text3: V roce 2023 společnost uvedla na trh inovativní hybridní okna, která kombinují výhody hliníku a PVC. Celý produktový sortiment společnosti – hliníková okna a konstrukce, hybridní okna a PVC okna – je dostupný na trzích Evropy, USA a Kanady.
      text4: Máme pobočky v Polsku, Rumunsku a na Ukrajině. Jsme otevřeni spolupráci a snažíme se budovat dlouhodobé vztahy s našimi zákazníky a být spolehlivým partnerem.
