  doors:
    alum:
      subtitle1: Hliníkové dveře bez skla
      info1: Plné hliníkové dveře jsou pevné a estetické konstrukce, které se skládají z rámu a hliníkového výplně, bez skla nebo prosklení. Tyto dveře se vyznačují pevností a vynikající odolností. Pevné hliníkové dveře jsou oblíbenou volbou v různých typech budov, včetně komerční, průmyslové a obytné výstavby. Jejich pevnost, odolnost a schopnost přizpůsobit se různým požadavkům je činí ceněným řešením na trhu dveří.
      subtitle2: Prosklené hliníkové dveře
      info2: Prosklené hliníkové dveře jsou lehké, což je činí snadno instalovatelné a použitelná. Hliníkové profily jsou zároveň mimořádně odolné, což zaručuje dlouhodobý provoz. Hliníkové dveře jsou také odolné vůči korozi, což je činí vhodnými pro použití v různých povětrnostních podmínkách, včetně u moře. Prosklené panely umožňují do místností dostatek přirozeného světla, což je činí vstřícnějšími a útulnějšími.
    pvc:
      subtitle1: PVC dveře bez skla
      info1: Pevné PVC dveře jsou k dispozici v různých designech, tvarech a barvách, což umožňuje přizpůsobit je interiérovému designu a individuálním preferencím. Je to praktické, odolné a všestranné řešení, které kombinuje mnoho výhod, jako je tepelná a zvuková izolace, snadná údržba a dostupnost různých designových možností. Jsou ideální volbou pro mnoho typů místností, jak v domácnosti, tak i v podnikání.
      subtitle2: Prosklené PVC dveře
      info2: Prosklené PVC dveře jsou stylovým a funkčním řešením, které kombinuje estetiku s tepelnou a zvukovou izolací v místnostech. Vyrobeny z odolného plastu, tyto dveře nabízejí elegantní vzhled, který se hodí do mnoha typů interiérů, jak moderních, tak tradičních. Prosklené panely umožňují do místností dostatek přirozeného světla, což je činí vstřícnějšími a útulnějšími.
  blinds:
    title: Žaluzie
    plastic: PLAST
    information: Informace
    text1: Systém OPOTERM je navržen pro instalaci v novostavbách a při rekonstrukci stávajících budov. Konstrukce systému OPOTERM umožňuje plně otevřenou, částečně uzavřenou nebo plně uzavřenou instalaci rolet. Aby byla zajištěna maximální tepelná izolace, je v boxu systému OPOTERM po celé délce boxu a bočních krytech nainstalována dodatečná izolace. Jednou z možností je použití moskytiéry zabudované do boxu rolety (MOSKITO systém). Integrovaný systém zajišťuje nezávislý chod rolet a MOSKITO moskytiéry. Komponenty použité pro výrobu rolet Aluprof jsou certifikovány pro splnění příslušných technických tolerancí a jsou k dispozici zákazníkům.
    text2: Rozměry plastového boxu
    text3: "Výška: 170 mm, 210 mm, 240 mm, šířka: 230 mm, 255 mm"
    item1: Částečně skrytý box
    item2: Úplně skrytý box
    item3: Otevřený box
    item4: Box s integrovaným moskytiérovým systémem
    aluminium: Hliník
    text4: Systém je navržen pro použití ve stávajících budovách. Tkanina je navinuta v hliníkovém boxu, který je instalován na stěnu nebo do okenní niky. Hliníkové profily jsou vyrobeny z vysoce kvalitního hliníkového plechu potaženého PUR-PA lakem a jsou vysoce odolné vůči oděru a povětrnostním podmínkám. Výplňová pěna poskytuje profilům dobré tepelné a zvukové izolační parametry. Spolehlivá konstrukce rolet a kvalitní výběr materiálů poskytují efektivní ochranu proti nežádoucím hostům.
    text5: Rozměry plastového boxu
    text6: "Výška a šířka: 150 mm, 165 mm, 180 mm, 205 mm"
    text7: Roleta může být ovládána ručně nebo elektricky pomocí motoru.
