  page-pvc:
    title2: PERFECT okna
    info1: Okna z profilových systémů třídy A poskytují nejvyšší úroveň komfortu v interiéru. Okna z profilových systémů třídy B a C (zejména kritická u laminovaných oken) mají vysokou pravděpodobnost deformace, což vede k průvanu a netěsnosti oken a tím pádem k nepohodlí pro obyvatele.
    info2: Okna z profilových systémů třídy A mají nejlepší ukazatele hospodárnosti (index tepelné vodivosti) pro vytápění a klimatizaci prostor. Na rozdíl od nich mají profilové systémy nižších tříd o 30-50% vyšší tepelné vodivosti, což zvyšuje náklady.
    info3: V rozpočtu domu je rozdíl v ceně oken různých tříd pouze několik %. Instalace oken třídy A zvyšuje hodnotu a tím pádem i hodnotu domu nebo bytu. To činí výběr oken PerfectWin třídy A výhodnou investicí, která vám přinese radost z užívání po mnoho let.
    info4: Produkty PerfectWin jsou vyráběny z kvalitních komponentů, jejichž kvalita je potvrzena evropskými certifikáty, s přísným dodržováním technologických norem společnosti Veka. Při objednání okenních konstrukcí a dveří u našeho partnerského prodejce nebo na webových stránkách získáte 5letou záruku na okenní konstrukce.
    info5: Unikátní a exkluzivní řešení, jako například Perfect Comfort Life - žaluzie integrované do skleněné jednotky, zvyšují komfort používání oken PerfectWin na nejvyšší úroveň.
