  page-hybrid:
    title1: co jsou
    title2: hybridní okna
    info1: Pokud váš rozpočet není omezený, pak z hlediska trvanlivosti je volba hliníkových konstrukcí nejlepší řešení. Pokud si přejete rozumně investovat prostředky do trvanlivých řešení, pak je volba hybridních oken zřejmá. Plastová okna nejsou z hlediska trvanlivosti rozumnou volbou.
    info2: Hybridní okna poskytují nejvyšší komfort uvnitř. Třetí těsnicí okruh poskytuje vysokou ochranu proti průvanu/vlhkosti při silných poryvech větru a dešti. Mezi hliníkovými konstrukcemi je tento komfort poskytován pouze profilovými systémy nejvyšší třídy, HI+ úrovně. Levnější hliníkové konstrukce zklamávají kupující nepříjemnými pocity v oblasti hliníkových profilů (zima v zimě, horko v létě).
    info3: Díky tepelné izolační výkonnosti (teplotní vodivost profilu Uf=1,1) poskytují nejvyšší úspory na vytápění a klimatizaci prostor.
    info4: Podle vyjádření nejvýznamnějších architektů používání přírodních materiálů, jako je hliník, poskytuje prestižní vzhled domům, což výrazně zvyšuje tržní hodnotu domu jako celku. V rozpočtu domu je rozdíl mezi cenou oken různých tříd pouze několik %. Proto jsou hybridní okna nejvýhodnější investicí z hlediska poměru.
    info5: Exkluzivní řešení, jako například žaluzie integrované do skleněné jednotky, zvyšují komfort používání hybridních oken na nejvyšší úroveň.
